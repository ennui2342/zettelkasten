<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      margin: 0;
      padding: 16px;
      color: #1a1a1a;
    }
    h1 {
      font-size: 15px;
      font-weight: 600;
      margin: 0 0 12px;
      color: #111;
    }
    button {
      width: 100%;
      padding: 10px 14px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
    button:disabled { background: #93c5fd; cursor: not-allowed; }
    #status {
      margin-top: 12px;
      padding: 8px 10px;
      border-radius: 5px;
      font-size: 13px;
      display: none;
    }
    #status.ok   { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    #status.err  { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    #status.info { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }
    #results { margin-top: 10px; font-size: 12px; color: #555; }
    .result-row { padding: 3px 0; border-bottom: 1px solid #f0f0f0; }
    .op { font-weight: 600; margin-right: 6px; }
    .op-CREATE  { color: #15803d; }
    .op-UPDATE  { color: #1d4ed8; }
    .op-STUB    { color: #6b7280; }
    .op-NOTHING { color: #9ca3af; }
    #port-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    #port-row label { font-size: 12px; color: #555; white-space: nowrap; }
    #port-input {
      width: 70px;
      padding: 4px 6px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <h1>Ingest → zettelkasten</h1>
  <div id="port-row">
    <label for="port-input">Server port:</label>
    <input id="port-input" type="number" value="7842" min="1024" max="65535">
  </div>
  <button id="btn">Ingest this page</button>
  <div id="status"></div>
  <div id="results"></div>
  <script src="popup.js"></script>
</body>
</html>
